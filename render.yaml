services:
  - type: web
    name: luoji-teacher-enhance-api
    env: node
    plan: free
    autoDeploy: true
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://newapi.yuaiweiwu.com/v1
      - key: OPENAI_MODEL
        value: gpt-5-5
